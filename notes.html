    // ============================================================
    // RENDER HELPERS
    // ============================================================
    function tagPill(tag, active) {
      var style = active
        ? 'display:inline-block;padding:2px 8px;margin:0 4px 0 0;font-size:10px;border:1px solid #FF6600;border-radius:2px;color:#FF6600;text-decoration:none;background:#fff5ee;'
        : 'display:inline-block;padding:2px 8px;margin:0 4px 0 0;font-size:10px;border:1px solid #99AACC;border-radius:2px;color:#336699;text-decoration:none;background:#eef2f8;';
      return '<a href="notes.html?tag=' + tag + '" class="entry-tag" style="' + style + '">#' + tag + '</a>';
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderCard(note, activeTag) {
      var tagPills = note.tags.map(function(t) { return tagPill(t, t === activeTag); }).join('');
      var commentaryHtml = note.commentary
        ? '<p style="font-size:12px;color:#444;line-height:1.6;margin:8px 0 0;">' + escHtml(note.commentary) + '</p>'
        : '';
      var headerText = note.chapter
        ? escHtml(note.chapter) + ' &nbsp;&middot;&nbsp; ' + escHtml(note.page)
        : escHtml(note.page);
      return '<div class="details-box" style="margin-bottom:16px;">'
        + '<div class="details-header">' + headerText + '</div>'
        + '<div style="padding:10px 12px;">'
        + '<blockquote style="margin:0 0 0 0;padding:8px 12px;border-left:3px solid #336699;background:#f0f4fa;font-size:12px;color:#333;line-height:1.7;font-style:italic;">'
        + '&ldquo;' + escHtml(note.quote) + '&rdquo;'
        + '</blockquote>'
        + commentaryHtml
        + '<div class="note-card-meta" style="font-size:11px;color:#6688aa;margin:8px 0 6px;">'
        + '<a href="' + note.url + '" style="color:#336699;">' + escHtml(note.book) + '</a>'
        + ' &mdash; ' + escHtml(note.author)
        + '</div>'
        + '<div>' + tagPills + '</div>'
        + '</div>'
        + '</div>';
    }

    function buildTagCounts() {
      var counts = {};
      notes.forEach(function(n) {
        n.tags.forEach(function(t) {
          counts[t] = (counts[t] || 0) + 1;
        });
      });
      return counts;
    }

    function renderTagCloud() {
      var counts = buildTagCounts();
      var sorted = Object.keys(counts).sort(function(a, b) { return counts[b] - counts[a]; });
      return sorted.map(function(tag) {
        return '<a href="notes.html?tag=' + tag + '" class="tag-cloud-pill">'
          + '#' + tag
          + ' <span class="tag-count">(' + counts[tag] + ')</span>'
          + '</a>';
      }).join('');
    }

    function renderSidebarTags(activeTag) {
      var counts = buildTagCounts();
      var sorted = Object.keys(counts).sort(function(a, b) { return counts[b] - counts[a]; });
      var html = sorted.map(function(tag) {
        var isActive = tag === activeTag;
        var style = isActive
          ? 'display:block;padding:3px 0;font-size:11px;color:#FF6600;font-weight:bold;text-decoration:none;'
          : 'display:block;padding:3px 0;font-size:11px;color:#336699;text-decoration:none;';
        return '<a href="notes.html?tag=' + tag + '" style="' + style + '">#' + tag + ' <span style="color:#99AACC;">(' + counts[tag] + ')</span></a>';
      }).join('');
      document.getElementById('sidebar-tag-list').innerHTML = html;
    }

    // ============================================================
    // MAIN
    // ============================================================
    window.addEventListener('DOMContentLoaded', function() {
      var params = new URLSearchParams(window.location.search);
      var tag = params.get('tag');
      var heading = document.getElementById('page-heading');
      var subtitle = document.getElementById('page-subtitle');
      var output = document.getElementById('notes-output');

      renderSidebarTags(tag);

      if (tag) {
        heading.textContent = 'Notes tagged #' + tag;
        var filtered = notes.filter(function(n) { return n.tags.indexOf(tag) !== -1; });
        subtitle.innerHTML = filtered.length + ' ' + (filtered.length === 1 ? 'entry' : 'entries')
          + ' &nbsp;&middot;&nbsp; <a href="notes.html" style="color:#6688aa;font-size:11px;">← all tags</a>';
        if (filtered.length === 0) {
          output.innerHTML = '<p style="font-size:12px;color:#6688aa;padding:20px 0;">No notes found for #' + escHtml(tag) + '.</p>';
        } else {
          output.innerHTML = filtered.map(function(n) { return renderCard(n, tag); }).join('');
        }
      } else {
        heading.textContent = 'Notes';
        subtitle.textContent = 'Browse by tag — click any to filter.';
        output.innerHTML = '<div style="padding:4px 0;">' + renderTagCloud() + '</div>';
